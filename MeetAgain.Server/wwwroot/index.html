<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MeetAgain.Client</title>
    <base href="/" />
    <!-- Load Tailwind for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/app.css" rel="stylesheet" />
    <link href="MeetAgain.Client.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Firebase SDK Imports -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script type="module" src="firebase.js"></script>


</head>

<body>
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16 mb-4"></div>
            <p class="text-gray-600 ml-4">Loading application...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- 
        ========================================================================================
        FIREBASE INTEROP JAVASCRIPT LAYER
        This script sets up Firebase using the global variables provided by the Canvas environment 
        and defines the functions used by the C# FirebaseInterop.cs class.
        ========================================================================================
    -->
    <script>
        // Global variables provided by the Canvas environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app;
        let auth;
        let db;
        let componentRef; // Reference to the Blazor component for JSInvokable calls

        // 1. INITIALIZATION FUNCTION (Called from C# FirebaseInterop.cs)
        function initializeFirebaseApp() {
            if (!firebaseConfig) {
                console.error("Firebase config is missing. Cannot initialize Firebase.");
                return;
            }

            try {
                // Initialize Firebase App
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                
                // Attach Auth State Listener
                auth.onAuthStateChanged(user => {
                    const userId = user ? user.uid : null;
                    const email = user ? user.email : null;
                    console.log(`[JS] Auth state changed. User ID: ${userId}`);

                    // 1. Save user ID reference for Firestore
                    if (userId) {
                        window.currentUserId = userId;
                    } else {
                        window.currentUserId = null;
                    }
                    
                    // 2. Inform the C# AuthService if the reference is available
                    if (componentRef) {
                        // The string 'OnAuthStateChanged' must match the C# [JSInvokable] method name
                        componentRef.invokeMethodAsync('OnAuthStateChanged', userId, email);
                    }
                });

                // Authenticate with custom token or anonymously
                if (initialAuthToken) {
                    auth.signInWithCustomToken(initialAuthToken)
                        .catch(error => {
                            console.error("Error signing in with custom token:", error);
                            auth.signInAnonymously();
                        });
                } else {
                    auth.signInAnonymously();
                }

                console.log("Firebase initialized and Auth listener established.");

            } catch (error) {
                console.error("Failed to initialize Firebase:", error);
            }
        }

        // 2. AUTHENTICATION FUNCTION (Called from C# FirebaseInterop.cs)
        async function handleAuthOperation(operation, email, password) {
            try {
                switch (operation) {
                    case 'LOGIN':
                        await auth.signInWithEmailAndPassword(email, password);
                        return true;
                    case 'REGISTER':
                        await auth.createUserWithEmailAndPassword(email, password);
                        return true;
                    case 'LOGOUT':
                        await auth.signOut();
                        return true;
                    default:
                        console.error("Unknown Auth Operation:", operation);
                        return false;
                }
            } catch (error) {
                console.error(`Auth Error during ${operation}:`, error.message);
                return false;
            }
        }
        
        // 3. GET USER ID FUNCTION (Called from C# FirebaseInterop.cs)
        function getFirebaseUserId() {
            // This is primarily for the initial sync during C# AuthService setup
            return auth?.currentUser?.uid || null;
        }


        // 4. FIRESTORE CRUD FUNCTION (Called from C# FirebaseInterop.cs)
        // Operation: ADD, GET, GET_ALL, GET_USER_DOCS, UPDATE_FIELDS, DELETE
        // Path: users/{userId}/collectionName OR public/data/collectionName
        // ID: Document ID (required for GET, UPDATE, DELETE)
        // Data: Object to store (for ADD, SET, UPDATE)
        async function handleFirestoreOperation(operation, path, id, data) {
            const fullPath = `artifacts/${appId}/${path}`;
            console.log(`[JS] Firestore Op: ${operation} on ${fullPath}/${id}`);

            const ref = id ? db.doc(`${fullPath}/${id}`) : db.collection(fullPath);

            // --- Firestore Helper Functions ---
            const getDocsWithId = (snapshot) => {
                const docs = [];
                snapshot.forEach(doc => {
                    // Include the Firestore ID in the returned object
                    docs.push({ Id: doc.id, ...doc.data() });
                });
                return docs;
            };

            const firestoreRetry = async (fn, maxRetries = 3) => {
                for (let i = 0; i < maxRetries; i++) {
                    try {
                        return await fn();
                    } catch (error) {
                        console.warn(`Firestore call failed, retrying in ${2 ** i}s...`, error.code);
                        if (i === maxRetries - 1) throw error;
                        await new Promise(resolve => setTimeout(resolve, (2 ** i) * 1000));
                    }
                }
            };
            // --- End Firestore Helper Functions ---

            return await firestoreRetry(async () => {
                switch (operation) {
                    case 'ADD':
                        const newDocRef = await db.collection(fullPath).add(data);
                        return JSON.stringify(newDocRef.id); // Return the generated ID
                        
                    case 'UPDATE_FIELDS':
                        await ref.update(data);
                        return JSON.stringify(true); // Return success boolean
                        
                    case 'DELETE':
                        await ref.delete();
                        return JSON.stringify(true); // Return success boolean
                        
                    case 'GET':
                        const docSnapshot = await ref.get();
                        if (docSnapshot.exists) {
                            // Return the document data including its ID
                            return JSON.stringify({ Id: docSnapshot.id, ...docSnapshot.data() });
                        }
                        return JSON.stringify(null); // Not found

                    case 'GET_USER_DOCS': // Used for Meetups, Friends, Groups
                    case 'GET_ALL':
                        const collectionSnapshot = await ref.get();
                        const docs = getDocsWithId(collectionSnapshot);
                        return JSON.stringify(docs);
                        
                    default:
                        throw new Error(`Unknown Firestore Operation: ${operation}`);
                }
            });
        }
        
        // This is necessary to expose the C# AuthService instance to the JS interop layer 
        // after the Blazor app has started. We attach it to the Window object so we 
        // can reference it in auth.onAuthStateChanged.
        Blazor.start().then(function (blazor) {
            // Find the C# AuthService instance in the Blazor component registry
            componentRef = blazor.serviceProvider.getService(blazor.platform.findType('MeetAgain.Client.Services.AuthService'));
        });

    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
